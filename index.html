<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upper Room Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f2f2f7;
            --panel: #ffffff;
            --border: #d9d9de;
            --text: #333;
            --muted: #666;
            --bubble-left: #e5e5ea;
            --bubble-right: #007aff;
            --accent: #007aff;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ccc;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .header h1 {
            font-size: 18px;
            color: #333;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 12px;
            color: #666;
        }

        .controls {
            padding: 10px 15px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 57px;
            z-index: 19;
        }

        .controls button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            background: #e5e5ea;
            color: #333;
            transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        .controls button:hover {
            transform: translateY(-1px);
        }

        .controls button.active {
            background: #007aff;
            color: white;
        }

        .chat-container {
            flex: 1 1 auto;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 15px 15px 90px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            scroll-behavior: smooth;
        }

        .day-marker {
            text-align: center;
            padding: 20px 15px;
            font-size: 14px;
            color: #888;
            background: #f2f2f7;
            font-weight: 600;
        }

        .day-marker.pentecost-day {
            color: #7a5933;
            background: linear-gradient(180deg, rgba(255, 248, 239, 0.92) 0%, rgba(247, 237, 220, 0.92) 100%);
            border: 1px solid rgba(181, 129, 64, 0.22);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(181, 129, 64, 0.08);
            margin: 6px 0;
        }

        .day-marker.pentecost-note {
            color: #8a6538;
            background: transparent;
        }

        .context-box {
            text-align: center;
            padding: 15px 15px;
            font-size: 13px;
            color: #555;
            background: #e8f4fd;
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
            line-height: 1.5;
        }

        .pentecost-box {
            text-align: center;
            padding: 20px 15px;
            font-size: 14px;
            color: #5b4636;
            background: linear-gradient(180deg, #fff8ef 0%, #f7eddc 100%);
            border: 1px solid rgba(181, 129, 64, 0.28);
            box-shadow: 0 8px 24px rgba(181, 129, 64, 0.10);
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
            font-weight: 600;
        }

        .scripture-banner {
            position: fixed;
            top: 108px;
            left: 50%;
            transform: translate(-50%, -10px);
            width: min(720px, calc(100vw - 28px));
            padding: 12px 16px 11px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(123, 123, 132, 0.16);
            box-shadow: 0 14px 34px rgba(45, 52, 54, 0.11);
            color: #655f58;
            opacity: 0;
            pointer-events: none;
            z-index: 85;
            transition: opacity 0.55s ease, transform 0.55s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .scripture-banner.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .scripture-banner.hidden {
            opacity: 0;
            transform: translate(-50%, -12px);
        }

        .scripture-banner[data-tone="rumor"] {
            background: rgba(250, 249, 247, 0.98);
            border-color: rgba(138, 132, 123, 0.18);
        }

        .scripture-banner[data-tone="promise"] {
            background: rgba(246, 249, 252, 0.98);
            border-color: rgba(96, 132, 171, 0.18);
        }

        .scripture-banner[data-tone="fire"] {
            background: rgba(255, 250, 243, 0.98);
            border-color: rgba(181, 129, 64, 0.20);
        }

        .scripture-banner-tag {
            display: block;
            font-size: 9px;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: #9a938b;
            margin-bottom: 6px;
            text-align: center;
        }

        .scripture-banner-text {
            font-size: 13px;
            line-height: 1.52;
            font-style: italic;
            text-align: center;
            color: #655f58;
        }

        .scripture-banner-citation {
            font-size: 10px;
            color: #9b948d;
            margin-top: 6px;
            text-align: center;
        }

        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.right { align-items: flex-end; }
        .message.left { align-items: flex-start; }

        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }

        .right .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 8px;
        }

        .left .bubble {
            background: #e5e5ea;
            color: black;
            border-bottom-left-radius: 8px;
        }

        .contact-name {
            font-size: 11px;
            color: #666;
            margin-bottom: 3px;
            padding-left: 5px;
        }

        .right .contact-name {
            text-align: right;
            padding-right: 5px;
            padding-left: 0;
        }

        .timestamp {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }

        .message.right .timestamp {
            text-align: right;
        }

        .read-receipt {
            font-size: 11px;
            color: #888;
            padding-left: 5px;
            margin-top: -3px;
        }

        .message.right .read-receipt {
            text-align: right;
            padding-right: 5px;
            padding-left: 0;
        }

        .char-peter { color: #d63031 !important; font-weight: 600; }
        .char-john { color: #0984e3 !important; font-weight: 600; }
        .char-marym { color: #6c5ce7 !important; font-weight: 600; }
        .char-thomas { color: #e17055 !important; font-weight: 600; }
        .char-mary { color: #a29bfe !important; font-weight: 600; }
        .char-joseph { color: #00b894 !important; font-weight: 600; }
        .char-cleopas { color: #fdcb6e !important; font-weight: 600; }
        .char-nicodemus { color: #2d3436 !important; font-weight: 600; }
        .char-james { color: #c44569 !important; font-weight: 600; }
        .char-andrew { color: #16a085 !important; font-weight: 600; }
        .char-matthew { color: #27ae60 !important; font-weight: 600; }
        .char-joanna { color: #e84393 !important; font-weight: 600; }
        .char-salome { color: #b9770e !important; font-weight: 600; }

        .scroll-btn {
            position: fixed;
            right: 18px;
            bottom: 22px;
            background: #007aff;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.25);
        }

        .scroll-btn.visible {
            display: block;
        }

        @keyframes messagePop {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        .message.pop .bubble {
            animation: messagePop 0.2s ease-out;
        }

        @keyframes highlightFlash {
            0%, 100% { box-shadow: 0 0 0 rgba(0, 122, 255, 0); }
            50% { box-shadow: 0 0 0 8px rgba(0, 122, 255, 0.10); }
        }

        .message.flash .bubble {
            animation: highlightFlash 0.4s ease-out;
        }

        .new-indicator {
            background: #007aff;
            color: white;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 11px;
            position: fixed;
            bottom: 80px;
            right: 18px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: auto;
            cursor: pointer;
            border: none;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.2);
        }

        .new-indicator.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .bubble.emotional {
            background: #ff6b6b !important;
            color: white !important;
        }

        .bubble.holy-spirit {
            background: linear-gradient(135deg, #007aff 0%, #a29bfe 100%) !important;
            color: white !important;
        }

        .bubble.pentecost-fire {
            position: relative;
            border: 1px solid rgba(181, 129, 64, 0.30);
            box-shadow: 0 0 0 1px rgba(255, 247, 232, 0.70) inset, 0 6px 18px rgba(181, 129, 64, 0.14);
            font-weight: 500;
        }

        .bubble.pentecost-fire::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: 0 0 18px rgba(236, 169, 74, 0.10);
        }

        .typing-name {
            font-size: 12px;
            color: #666;
            padding-left: 5px;
        }



        .contact-trigger {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            font: inherit;
            color: inherit;
            cursor: help;
        }

        .contact-trigger:hover,
        .contact-trigger:focus-visible {
            text-decoration: underline dotted currentColor;
            text-underline-offset: 2px;
            outline: none;
        }

        .bio-popover {
            position: fixed;
            top: 0;
            left: 0;
            width: min(320px, calc(100vw - 24px));
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(25, 25, 28, 0.08);
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
            padding: 13px 14px 14px;
            z-index: 220;
            opacity: 0;
            transform: translateY(6px) scale(0.98);
            transition: opacity 0.18s ease, transform 0.18s ease;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .bio-popover.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .bio-kicker {
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8b8b92;
            margin-bottom: 5px;
        }

        .bio-name {
            font-size: 15px;
            font-weight: 700;
            color: #2f2f35;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .bio-role {
            font-size: 12px;
            color: #6e6e76;
            margin-bottom: 8px;
        }

        .bio-line {
            font-size: 12px;
            color: #4d4d54;
            line-height: 1.45;
            margin-top: 7px;
        }

        .bio-line strong {
            color: #2f2f35;
            font-weight: 600;
        }

        .message.typing-indicator {
            margin-bottom: 10px;
        }

        .message.typing-indicator .bubble {
            min-width: 58px;
            padding: 10px 14px;
            background: #ececf1;
            color: #7b7b84;
        }

        .message.right.typing-indicator .bubble {
            background: rgba(0, 122, 255, 0.12);
            color: #356491;
        }

        .message.typing-indicator.fade-away {
            animation: fadeTypingOut 0.22s ease forwards;
        }

        .typing-dots {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-height: 10px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.28;
            animation: typingPulse 1.05s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

        .typing-caption {
            font-size: 10px;
            color: #9a9aa1;
            margin-top: 4px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes typingPulse {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.25; }
            40% { transform: translateY(-1px); opacity: 0.7; }
        }

        @keyframes fadeTypingOut {
            to { opacity: 0; transform: translateY(-4px); }
        }

        @media (max-width: 640px) {
            .controls {
                top: 57px;
            }

            .bubble {
                max-width: 82%;
            }

            .scroll-btn {
                right: 14px;
                bottom: 18px;
            }

            .new-indicator {
                right: 14px;
            }

            .scripture-banner {
                top: 102px;
                width: calc(100vw - 18px);
                padding: 11px 13px 10px;
                border-radius: 14px;
            }

            .scripture-banner-text {
                font-size: 12.5px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>The Upper Room Chat</h1>
            <div class="subtitle" id="participant-count">13 participants</div>
        </div>

        <div class="controls">
            <button onclick="setSpeed(1)" id="speed-1">Fast (4 min)</button>
            <button onclick="setSpeed(2)" id="speed-2" class="active">Normal (10 min)</button>
            <button onclick="setSpeed(3)" id="speed-3">Slow (20 min)</button>
        </div>

        <div class="scripture-banner hidden" id="scripture-banner" aria-live="polite" aria-atomic="true">
            <div class="scripture-banner-tag" id="scripture-banner-tag"></div>
            <div class="scripture-banner-text" id="scripture-banner-text"></div>
            <div class="scripture-banner-citation" id="scripture-banner-citation"></div>
        </div>

        <div class="chat-container" id="chat" aria-live="polite" aria-label="Upper Room chat playback"><div id="bottom-sentinel" aria-hidden="true"></div></div>
    </div>

    <button class="new-indicator" id="new-indicator" type="button" onclick="resumeLiveFollow()" aria-label="Jump to new messages">New messages below</button>
    <button class="scroll-btn" id="scroll-btn" onclick="resumeLiveFollow()" aria-label="Jump to latest message">↓</button>
    <div class="bio-popover" id="bio-popover" role="dialog" aria-live="polite" aria-hidden="true">
        <div class="bio-kicker">Upper Room Companion</div>
        <div class="bio-name" id="bio-name"></div>
        <div class="bio-role" id="bio-role"></div>
        <div class="bio-line" id="bio-summary"></div>
        <div class="bio-line" id="bio-relation"></div>
        <div class="bio-line" id="bio-why"></div>
    </div>


    <script>
        'use strict';

        // Debug logging to help track issues
        console.log('Upper Room Chat loaded successfully');

        const rawMessages = [
        {
                "day": "Day 1 – Good Friday",
                "time": 720
        },
        {
                "context": true,
                "content": "Just after noon. The hill is filling, the city is loud, and those who love Jesus are trying to stay near one another while everything comes apart."
        },
        {
                "from": "Mary Magdalene",
                "text": "They've taken Him to Golgotha.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "John",
                "text": "I'm here with His mother.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Joanna",
                "text": "The city is full of shouting.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "Mary (mother)",
                "text": "Stay near one another.",
                "side": "left",
                "charClass": "char-mary",
                "emotional": true
        },
        {
                "from": "John",
                "text": "He spoke to me from the cross. He told me to care for His mother.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Salome",
                "text": "Is there anything we can do?",
                "side": "left",
                "charClass": "char-salome"
        },
        {
                "from": "John",
                "text": "We stay. We do not look away.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "note": "*Friday — later*",
                "time": 900
        },
        {
                "from": "Matthew",
                "text": "The sky has gone dark.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Andrew",
                "text": "At this hour?",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "John",
                "text": "He cried out.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Mary Magdalene",
                "text": "He said, \"It is finished.\"",
                "side": "left",
                "charClass": "char-marym",
                "emotional": true
        },
        {
                "from": "James",
                "text": "...",
                "side": "left",
                "charClass": "char-james"
        },
        {
                "from": "Peter",
                "text": "No.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "Mary (mother)",
                "text": "Lord, receive my son.",
                "side": "left",
                "charClass": "char-mary",
                "emotional": true
        },
        {
                "note": "*The ground shook.*",
                "time": 905
        },
        {
                "from": "Cleopas",
                "text": "There was an earthquake here.",
                "side": "left",
                "charClass": "char-cleopas"
        },
        {
                "from": "Joanna",
                "text": "People are running from the hill.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "John",
                "text": "The centurion said, \"Surely this was the Son of God.\"",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "I should have been there.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "John",
                "text": "Come back to us.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "note": "*Friday evening*",
                "time": 1110
        },
        {
                "note": "*Joseph of Arimathea and Nicodemus join the chat*",
                "time": 1112
        },
        {
                "from": "Joseph of Arimathea",
                "text": "I have asked Pilate for His body.",
                "side": "left",
                "charClass": "char-joseph"
        },
        {
                "from": "Nicodemus",
                "text": "I am bringing myrrh and aloes.",
                "side": "left",
                "charClass": "char-nicodemus"
        },
        {
                "from": "Mary Magdalene",
                "text": "We are following.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Joanna",
                "text": "We saw where they laid Him.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "Salome",
                "text": "We will return after the Sabbath with spices.",
                "side": "left",
                "charClass": "char-salome"
        },
        {
                "from": "Peter",
                "text": "The stone is sealed?",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Mary Magdalene",
                "text": "Yes.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Thomas",
                "text": "Then it is over.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "John",
                "text": "He told us this would happen.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Thomas",
                "text": "He said many things we did not understand.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "day": "Day 2 – Holy Saturday",
                "time": 720
        },
        {
                "context": true,
                "content": "The Sabbath settles over Jerusalem. The women wait with prepared spices, the disciples stay together behind closed doors, and grief hangs over the room like a weight no one can move."
        },
        {
                "from": "Mary Magdalene",
                "text": "It is quiet.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Andrew",
                "text": "Too quiet.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "Peter",
                "text": "I keep hearing the rooster.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "John",
                "text": "Peter—",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "No. Let me say it. I said I would die with Him, and before dawn I denied Him three times.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "Mary (mother)",
                "text": "He knew your heart before you spoke.",
                "side": "left",
                "charClass": "char-mary"
        },
        {
                "from": "Peter",
                "text": "That makes it worse.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "Matthew",
                "text": "We should stay together today.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Thomas",
                "text": "And then what?",
                "side": "right",
                "charClass": "char-thomas"

        // Playback state variables
        let playbackSpeed = 2; // 1=Fast(4min), 2=Normal(10min), 3=Slow(20min)
        let isPlaying = false;
        let currentIndex = -1;
        let playbackInterval = null;
        let totalDurationMs = 600000; // Default 10 minutes

        // Speed multipliers (time between messages in ms)
        const SPEED_MULTIPLIERS = {
            1: 250,   // Fast - 4 min total
            2: 1000,  // Normal - 10 min total
            3: 2000   // Slow - 20 min total
        };

        // DOM element references (will be populated on load)
        let chatContainer = null;
        let scriptureBanner = null;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM Loaded - Initializing Upper Room Chat');
            
            // Get DOM elements
            chatContainer = document.getElementById('chat');
            scriptureBanner = document.getElementById('scripture-banner');
            
            if (!chatContainer) {
                console.error('Chat container not found!');
                return;
            }

            // Setup auto-start - wait a moment then start playback
            setTimeout(() => {
                const normalBtn = document.getElementById('speed-2');
                if (normalBtn) {
                    console.log('Auto-starting chat at Normal speed');
                    setSpeed(2);
                } else {
                    console.warn('Normal speed button not found - click a speed button to start');
                }
            }, 500);

            // Setup scroll detection
            chatContainer.addEventListener('scroll', handleScroll);
        });

        // Set playback speed
        function setSpeed(speed) {
            console.log(`Setting speed to: ${speed}`);
            
            // Update active button styling
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            
            const speedBtn = document.getElementById(`speed-${speed}`);
            if (speedBtn) {
                speedBtn.classList.add('active');
            }

            playbackSpeed = speed;
            
            // Reset duration based on speed
            switch(speed) {
                case 1: totalDurationMs = 240000; break;    // 4 minutes
                case 2: totalDurationMs = 600000; break;   // 10 minutes  
                case 3: totalDurationMs = 1200000; break;  // 20 minutes
            }

            // Start playback if not already playing
            if (!isPlaying) {
                startPlayback();
            } else {
                // Restart with new speed
                currentIndex = -1;
                chatContainer.innerHTML = '<div id="bottom-sentinel" aria-hidden="true"></div>';
                startPlayback();
            }
        }

        // Start chat playback
        function startPlayback() {
            console.log('Starting playback...');
            
            if (isPlaying) return;
            
            isPlaying = true;
            
            // If starting fresh, render initial messages
            if (currentIndex === -1 && chatContainer.children.length <= 1) {
                renderInitialMessages();
            }

            // Set up interval for message display
            playbackInterval = setInterval(() => {
                currentIndex++;
                
                if (currentIndex >= rawMessages.length) {
                    console.log('Playback complete');
                    stopPlayback();
                    return;
                }

                const msg = rawMessages[currentIndex];
                renderMessage(msg);
                
                // Auto-scroll to bottom
                scrollToBottom();
            }, SPEED_MULTIPLIERS[playbackSpeed]);
        }

        // Stop playback
        function stopPlayback() {
            console.log('Stopping playback');
            isPlaying = false;
            
            if (playbackInterval) {
                clearInterval(playbackInterval);
                playbackInterval = null;
            }
        }

        // Resume live follow (when user scrolls and new messages appear)
        function resumeLiveFollow() {
            console.log('Resuming live follow');
            scrollToBottom();
            
            if (!isPlaying && currentIndex < rawMessages.length - 1) {
                startPlayback();
            }
        }

        // Handle scroll events to show/hide controls
        function handleScroll() {
            const scrollTop = chatContainer.scrollTop;
            const scrollHeight = chatContainer.scrollHeight;
            const clientHeight = chatContainer.clientHeight;
            
            // Show scroll button when scrolled up significantly
            const scrollBtn = document.getElementById('scroll-btn');
            if (scrollTop > 200) {
                scrollBtn?.classList.add('visible');
            } else {
                scrollBtn?.classList.remove('visible');
            }

            // Check for new messages indicator
            const atBottom = Math.abs(scrollHeight - scrollTop - clientHeight) < 50;
            const newIndicator = document.getElementById('new-indicator');
            
            if (!atBottom && isPlaying) {
                newIndicator?.classList.add('visible');
            } else {
                newIndicator?.classList.remove('visible');
            }
        }

        // Render initial messages (up to a reasonable number)
        function renderInitialMessages() {
            console.log('Rendering initial messages...');
            
            const fragment = document.createDocumentFragment();
            const initialCount = Math.min(10, rawMessages.length);
            
            for (let i = 0; i < initialCount && rawMessages[i]; i++) {
                fragment.appendChild(createMessageElement(rawMessages[i]));
            }
            
            chatContainer.insertBefore(fragment, document.getElementById('bottom-sentinel'));
        }

        // Create message DOM element
        function createMessageElement(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            if (msg.side === 'right') {
                msgDiv.classList.add('right');
            } else if (msg.side === 'left') {
                msgDiv.classList.add('left');
            }

            // Handle different message types
            if (msg.day) {
                // Day marker
                const dayMarker = document.createElement('div');
                dayMarker.className = 'day-marker';
                dayMarker.textContent = msg.day;
                msgDiv.appendChild(dayMarker);
                return msgDiv;
            }

            if (msg.context) {
                // Context box
                const contextBox = document.createElement('div');
                contextBox.className = 'context-box';
                contextBox.textContent = msg.content;
                msgDiv.appendChild(contextBox);
                return msgDiv;
            }

            if (msg.note) {
                // System note
                const note = document.createElement('div');
                note.style.textAlign = 'center';
                note.style.color = '#888';
                note.style.fontSize = '12px';
                note.textContent = msg.note;
                msgDiv.appendChild(note);
                return msgDiv;
            }

            if (msg.type === 'verse') {
                // Scripture verse banner
                showScriptureBanner(msg.verseText, msg.citation, msg.tone || 'promise');
                const verseDiv = document.createElement('div');
                verseDiv.style.textAlign = 'center';
                verseDiv.style.color = '#666';
                verseDiv.style.fontSize = '12px';
                verseDiv.innerHTML = `<em>${msg.verseText}</em><br><small>— ${msg.citation}</small>`;
                msgDiv.appendChild(verseDiv);
                return msgDiv;
            }

            // Regular message bubble
            if (!msg.from || !msg.text) {
                console.warn('Invalid message format:', msg);
                return null;
            }

            const name = document.createElement('div');
            name.className = 'contact-name';
            
            if (msg.side === 'right') {
                name.textContent = msg.from;
            } else {
                name.textContent = msg.from;
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // Add special styling for emotional messages
            if (msg.emotional) {
                bubble.classList.add('emotional');
            }

            // Add character class for colored names
            if (msg.charClass) {
                name.classList.add(msg.charClass);
            }

            const text = document.createTextNode(msg.text);
            bubble.appendChild(text);

            msgDiv.appendChild(name);
            msgDiv.appendChild(bubble);

            return msgDiv;
        }

        // Render a single message during playback
        function renderMessage(msg) {
            const element = createMessageElement(msg);
            if (element) {
                chatContainer.insertBefore(element, document.getElementById('bottom-sentinel'));
                
                // Add animation class for pop effect
                setTimeout(() => {
                    element.classList.add('pop');
                }, 10);
            }
        }

        // Show scripture banner at top of screen
        function showScriptureBanner(text, citation, tone) {
            const tagEl = document.getElementById('scripture-banner-tag');
            const textEl = document.getElementById('scripture-banner-text');
            const citationEl = document.getElementById('scripture-banner-citation');

            if (tone === 'rumor') {
                tagEl.textContent = 'Rumor in the city';
            } else if (tone === 'promise') {
                tagEl.textContent = 'God's Promise';
            } else if (tone === 'fire') {
                tagEl.textContent = 'Holy Spirit Fire';
            } else {
                tagEl.textContent = 'Scripture';
            }

            textEl.textContent = text;
            citationEl.textContent = citation;

            scriptureBanner.setAttribute('data-tone', tone);
            scriptureBanner.classList.remove('hidden');
            scriptureBanner.classList.add('visible');

            // Auto-hide after 8 seconds
            setTimeout(() => {
                scriptureBanner.classList.remove('visible');
                scriptureBanner.classList.add('hidden');
            }, 8000);
        }

        // Scroll to bottom of chat
        function scrollToBottom() {
            if (chatContainer) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // Log playback stats periodically for debugging
        setInterval(() => {
            if (isPlaying) {
                console.log(`Playback: ${currentIndex + 1}/${rawMessages.length} (${Math.round(((currentIndex + 1) / rawMessages.length) * 100)}%)`);
            }
        }, totalDurationMs / 5);

        console.log('Upper Room Chat script loaded - ready to play!');
    </script>
</body>
</html>

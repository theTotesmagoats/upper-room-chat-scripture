<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upper Room Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f2f2f7;
            --panel: #ffffff;
            --border: #d9d9de;
            --text: #333;
            --muted: #666;
            --bubble-left: #e5e5ea;
            --bubble-right: #007aff;
            --accent: #007aff;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ccc;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .header h1 {
            font-size: 18px;
            color: #333;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 12px;
            color: #666;
        }

        .controls {
            padding: 10px 15px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 57px;
            z-index: 19;
        }

        .controls button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            background: #e5e5ea;
            color: #333;
            transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        .controls button:hover {
            transform: translateY(-1px);
        }

        .controls button.active {
            background: #007aff;
            color: white;
        }

        .chat-container {
            flex: 1 1 auto;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 15px 15px 90px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            scroll-behavior: smooth;
        }

        .day-marker {
            text-align: center;
            padding: 20px 15px;
            font-size: 14px;
            color: #888;
            background: #f2f2f7;
            font-weight: 600;
        }

        .day-marker.pentecost-day {
            color: #7a5933;
            background: linear-gradient(180deg, rgba(255, 248, 239, 0.92) 0%, rgba(247, 237, 220, 0.92) 100%);
            border: 1px solid rgba(181, 129, 64, 0.22);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(181, 129, 64, 0.08);
            margin: 6px 0;
        }

        .day-marker.pentecost-note {
            color: #8a6538;
            background: transparent;
        }

        .context-box {
            text-align: center;
            padding: 15px 15px;
            font-size: 13px;
            color: #555;
            background: #e8f4fd;
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
            line-height: 1.5;
        }

        .pentecost-box {
            text-align: center;
            padding: 20px 15px;
            font-size: 14px;
            color: #5b4636;
            background: linear-gradient(180deg, #fff8ef 0%, #f7eddc 100%);
            border: 1px solid rgba(181, 129, 64, 0.28);
            box-shadow: 0 8px 24px rgba(181, 129, 64, 0.10);
            margin: 10px auto;
            max-width: 600px;
            border-radius: 10px;
            font-weight: 600;
        }

        .scripture-banner {
            position: fixed;
            top: 108px;
            left: 50%;
            transform: translate(-50%, -10px);
            width: min(720px, calc(100vw - 28px));
            padding: 12px 16px 11px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(123, 123, 132, 0.16);
            box-shadow: 0 14px 34px rgba(45, 52, 54, 0.11);
            color: #655f58;
            opacity: 0;
            pointer-events: none;
            z-index: 85;
            transition: opacity 0.55s ease, transform 0.55s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .scripture-banner.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .scripture-banner.hidden {
            opacity: 0;
            transform: translate(-50%, -12px);
        }

        .scripture-banner[data-tone="rumor"] {
            background: rgba(250, 249, 247, 0.98);
            border-color: rgba(138, 132, 123, 0.18);
        }

        .scripture-banner[data-tone="promise"] {
            background: rgba(246, 249, 252, 0.98);
            border-color: rgba(96, 132, 171, 0.18);
        }

        .scripture-banner[data-tone="fire"] {
            background: rgba(255, 250, 243, 0.98);
            border-color: rgba(181, 129, 64, 0.20);
        }

        .scripture-banner-tag {
            display: block;
            font-size: 9px;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: #9a938b;
            margin-bottom: 6px;
            text-align: center;
        }

        .scripture-banner-text {
            font-size: 13px;
            line-height: 1.52;
            font-style: italic;
            text-align: center;
            color: #655f58;
        }

        .scripture-banner-citation {
            font-size: 10px;
            color: #9b948d;
            margin-top: 6px;
            text-align: center;
        }

        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.right { align-items: flex-end; }
        .message.left { align-items: flex-start; }

        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }

        .right .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 8px;
        }

        .left .bubble {
            background: #e5e5ea;
            color: black;
            border-bottom-left-radius: 8px;
        }

        .contact-name {
            font-size: 11px;
            color: #666;
            margin-bottom: 3px;
            padding-left: 5px;
        }

        .right .contact-name {
            text-align: right;
            padding-right: 5px;
            padding-left: 0;
        }

        .timestamp {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }

        .message.right .timestamp {
            text-align: right;
        }

        .read-receipt {
            font-size: 11px;
            color: #888;
            padding-left: 5px;
            margin-top: -3px;
        }

        .message.right .read-receipt {
            text-align: right;
            padding-right: 5px;
            padding-left: 0;
        }

        .char-peter { color: #d63031 !important; font-weight: 600; }
        .char-john { color: #0984e3 !important; font-weight: 600; }
        .char-marym { color: #6c5ce7 !important; font-weight: 600; }
        .char-thomas { color: #e17055 !important; font-weight: 600; }
        .char-mary { color: #a29bfe !important; font-weight: 600; }
        .char-joseph { color: #00b894 !important; font-weight: 600; }
        .char-cleopas { color: #fdcb6e !important; font-weight: 600; }
        .char-nicodemus { color: #2d3436 !important; font-weight: 600; }
        .char-james { color: #c44569 !important; font-weight: 600; }
        .char-andrew { color: #16a085 !important; font-weight: 600; }
        .char-matthew { color: #27ae60 !important; font-weight: 600; }
        .char-joanna { color: #e84393 !important; font-weight: 600; }
        .char-salome { color: #b9770e !important; font-weight: 600; }

        .scroll-btn {
            position: fixed;
            right: 18px;
            bottom: 22px;
            background: #007aff;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.25);
        }

        .scroll-btn.visible {
            display: block;
        }

        @keyframes messagePop {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        .message.pop .bubble {
            animation: messagePop 0.2s ease-out;
        }

        @keyframes highlightFlash {
            0%, 100% { box-shadow: 0 0 0 rgba(0, 122, 255, 0); }
            50% { box-shadow: 0 0 0 8px rgba(0, 122, 255, 0.10); }
        }

        .message.flash .bubble {
            animation: highlightFlash 0.4s ease-out;
        }

        .new-indicator {
            background: #007aff;
            color: white;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 11px;
            position: fixed;
            bottom: 80px;
            right: 18px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: auto;
            cursor: pointer;
            border: none;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.2);
        }

        .new-indicator.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .bubble.emotional {
            background: #ff6b6b !important;
            color: white !important;
        }

        .bubble.holy-spirit {
            background: linear-gradient(135deg, #007aff 0%, #a29bfe 100%) !important;
            color: white !important;
        }

        .bubble.pentecost-fire {
            position: relative;
            border: 1px solid rgba(181, 129, 64, 0.30);
            box-shadow: 0 0 0 1px rgba(255, 247, 232, 0.70) inset, 0 6px 18px rgba(181, 129, 64, 0.14);
            font-weight: 500;
        }

        .bubble.pentecost-fire::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: 0 0 18px rgba(236, 169, 74, 0.10);
        }

        .typing-name {
            font-size: 12px;
            color: #666;
            padding-left: 5px;
        }



        .contact-trigger {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            font: inherit;
            color: inherit;
            cursor: help;
        }

        .contact-trigger:hover,
        .contact-trigger:focus-visible {
            text-decoration: underline dotted currentColor;
            text-underline-offset: 2px;
            outline: none;
        }

        .bio-popover {
            position: fixed;
            top: 0;
            left: 0;
            width: min(320px, calc(100vw - 24px));
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(25, 25, 28, 0.08);
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
            padding: 13px 14px 14px;
            z-index: 220;
            opacity: 0;
            transform: translateY(6px) scale(0.98);
            transition: opacity 0.18s ease, transform 0.18s ease;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .bio-popover.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .bio-kicker {
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8b8b92;
            margin-bottom: 5px;
        }

        .bio-name {
            font-size: 15px;
            font-weight: 700;
            color: #2f2f35;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .bio-role {
            font-size: 12px;
            color: #6e6e76;
            margin-bottom: 8px;
        }

        .bio-line {
            font-size: 12px;
            color: #4d4d54;
            line-height: 1.45;
            margin-top: 7px;
        }

        .bio-line strong {
            color: #2f2f35;
            font-weight: 600;
        }

        .message.typing-indicator {
            margin-bottom: 10px;
        }

        .message.typing-indicator .bubble {
            min-width: 58px;
            padding: 10px 14px;
            background: #ececf1;
            color: #7b7b84;
        }

        .message.right.typing-indicator .bubble {
            background: rgba(0, 122, 255, 0.12);
            color: #356491;
        }

        .message.typing-indicator.fade-away {
            animation: fadeTypingOut 0.22s ease forwards;
        }

        .typing-dots {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-height: 10px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.28;
            animation: typingPulse 1.05s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

        .typing-caption {
            font-size: 10px;
            color: #9a9aa1;
            margin-top: 4px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes typingPulse {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.25; }
            40% { transform: translateY(-1px); opacity: 0.7; }
        }

        @keyframes fadeTypingOut {
            to { opacity: 0; transform: translateY(-4px); }
        }

        @media (max-width: 640px) {
            .controls {
                top: 57px;
            }

            .bubble {
                max-width: 82%;
            }

            .scroll-btn {
                right: 14px;
                bottom: 18px;
            }

            .new-indicator {
                right: 14px;
            }

            .scripture-banner {
                top: 102px;
                width: calc(100vw - 18px);
                padding: 11px 13px 10px;
                border-radius: 14px;
            }

            .scripture-banner-text {
                font-size: 12.5px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>The Upper Room Chat</h1>
            <div class="subtitle" id="participant-count">13 participants</div>
        </div>

        <div class="controls">
            <button onclick="setSpeed(1)" id="speed-1">Fast (4 min)</button>
            <button onclick="setSpeed(2)" id="speed-2" class="active">Normal (10 min)</button>
            <button onclick="setSpeed(3)" id="speed-3">Slow (20 min)</button>
        </div>

        <div class="scripture-banner hidden" id="scripture-banner" aria-live="polite" aria-atomic="true">
            <div class="scripture-banner-tag" id="scripture-banner-tag"></div>
            <div class="scripture-banner-text" id="scripture-banner-text"></div>
            <div class="scripture-banner-citation" id="scripture-banner-citation"></div>
        </div>

        <div class="chat-container" id="chat" aria-live="polite" aria-label="Upper Room chat playback"><div id="bottom-sentinel" aria-hidden="true"></div></div>
    </div>

    <button class="new-indicator" id="new-indicator" type="button" onclick="resumeLiveFollow()" aria-label="Jump to new messages">New messages below</button>
    <button class="scroll-btn" id="scroll-btn" onclick="resumeLiveFollow()" aria-label="Jump to latest message">↓</button>
    <div class="bio-popover" id="bio-popover" role="dialog" aria-live="polite" aria-hidden="true">
        <div class="bio-kicker">Upper Room Companion</div>
        <div class="bio-name" id="bio-name"></div>
        <div class="bio-role" id="bio-role"></div>
        <div class="bio-line" id="bio-summary"></div>
        <div class="bio-line" id="bio-relation"></div>
        <div class="bio-line" id="bio-why"></div>
    </div>


    <script>
        const rawMessages = [
        {
                "day": "Day 1 – Good Friday",
                "time": 720
        },
        {
                "context": true,
                "content": "Just after noon. The hill is filling, the city is loud, and those who love Jesus are trying to stay near one another while everything comes apart."
        },
        {
                "from": "Mary Magdalene",
                "text": "They've taken Him to Golgotha.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "John",
                "text": "I'm here with His mother.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Joanna",
                "text": "The city is full of shouting.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "Mary (mother)",
                "text": "Stay near one another.",
                "side": "left",
                "charClass": "char-mary",
                "emotional": true
        },
        {
                "from": "John",
                "text": "He spoke to me from the cross. He told me to care for His mother.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Salome",
                "text": "Is there anything we can do?",
                "side": "left",
                "charClass": "char-salome"
        },
        {
                "from": "John",
                "text": "We stay. We do not look away.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "note": "*Friday — later*",
                "time": 900
        },
        {
                "from": "Matthew",
                "text": "The sky has gone dark.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Andrew",
                "text": "At this hour?",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "John",
                "text": "He cried out.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Mary Magdalene",
                "text": "He said, "It is finished."",
                "side": "left",
                "charClass": "char-marym",
                "emotional": true
        },
        {
                "from": "James",
                "text": "...",
                "side": "left",
                "charClass": "char-james"
        },
        {
                "from": "Peter",
                "text": "No.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "Mary (mother)",
                "text": "Lord, receive my son.",
                "side": "left",
                "charClass": "char-mary",
                "emotional": true
        },
        {
                "note": "*The ground shook.*",
                "time": 905
        },
        {
                "from": "Cleopas",
                "text": "There was an earthquake here.",
                "side": "left",
                "charClass": "char-cleopas"
        },
        {
                "from": "Joanna",
                "text": "People are running from the hill.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "John",
                "text": "The centurion said, "Surely this was the Son of God."",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "I should have been there.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "John",
                "text": "Come back to us.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "note": "*Friday evening*",
                "time": 1110
        },
        {
                "note": "*Joseph of Arimathea and Nicodemus join the chat*",
                "time": 1112
        },
        {
                "from": "Joseph of Arimathea",
                "text": "I have asked Pilate for His body.",
                "side": "left",
                "charClass": "char-joseph"
        },
        {
                "from": "Nicodemus",
                "text": "I am bringing myrrh and aloes.",
                "side": "left",
                "charClass": "char-nicodemus"
        },
        {
                "from": "Mary Magdalene",
                "text": "We are following.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Joanna",
                "text": "We saw where they laid Him.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "Salome",
                "text": "We will return after the Sabbath with spices.",
                "side": "left",
                "charClass": "char-salome"
        },
        {
                "from": "Peter",
                "text": "The stone is sealed?",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Mary Magdalene",
                "text": "Yes.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Thomas",
                "text": "Then it is over.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "John",
                "text": "He told us this would happen.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Thomas",
                "text": "He said many things we did not understand.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "day": "Day 2 – Holy Saturday",
                "time": 720
        },
        {
                "context": true,
                "content": "The Sabbath settles over Jerusalem. The women wait with prepared spices, the disciples stay together behind closed doors, and grief hangs over the room like a weight no one can move."
        },
        {
                "from": "Mary Magdalene",
                "text": "It is quiet.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Andrew",
                "text": "Too quiet.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "Peter",
                "text": "I keep hearing the rooster.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "John",
                "text": "Peter—",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "No. Let me say it. I said I would die with Him, and before dawn I denied Him three times.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "Mary (mother)",
                "text": "He knew your heart before you spoke.",
                "side": "left",
                "charClass": "char-mary"
        },
        {
                "from": "Peter",
                "text": "That makes it worse.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "Matthew",
                "text": "We should stay together today.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Thomas",
                "text": "And then what?",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "note": "*No one replies for a long time.*",
                "time": 760
        },
        {
                "day": "Day 3 – Resurrection Sunday",
                "time": 300
        },
        {
                "context": true,
                "content": "Before sunrise, Mary Magdalene, Joanna, and Salome go toward the tomb with spices. They expect burial. They do not expect the world to begin again."
        },
        {
                "from": "Mary Magdalene",
                "text": "We're going to the tomb now.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Joanna",
                "text": "Bringing spices.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "Salome",
                "text": "Who will move the stone?",
                "side": "left",
                "charClass": "char-salome"
        },
        {
                "note": "*Sunday — dawn*",
                "time": 360
        },
        {
                "from": "Mary Magdalene",
                "text": "The stone is moved.",
                "side": "left",
                "charClass": "char-marym",
                "emotional": true
        },
        {
                "from": "Joanna",
                "text": "The tomb is open.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "Salome",
                "text": "He is not here.",
                "side": "left",
                "charClass": "char-salome",
                "emotional": true
        },
        {
                "from": "Peter",
                "text": "What do you mean, not here?",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Mary Magdalene",
                "text": "Two men in dazzling clothes. They said, 'Why do you seek the living among the dead?'",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "John",
                "text": "Peter. Run.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "Already gone.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "John",
                "text": "Me too.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "note": "*Minutes later*",
                "time": 372
        },
        {
                "from": "John",
                "text": "The linen cloths are here.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "The tomb is empty.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Thomas",
                "text": "Empty does not mean risen.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "type": "verse",
                "side": "right",
                "tag": "Scripture",
                "verseText": "'But these words seemed to them an idle tale, and they did not believe them.'",
                "citation": "Luke 24:11"
        },
        {
                "from": "Mary Magdalene",
                "text": "I stayed. I was weeping.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Mary Magdalene",
                "text": "I thought He was the gardener.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Mary Magdalene",
                "text": "He said my name.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Mary Magdalene",
                "text": ""Mary."",
                "side": "left",
                "charClass": "char-marym",
                "emotional": true
        },
        {
                "from": "John",
                "text": "...",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Mary Magdalene",
                "text": "It is Him.",
                "side": "left",
                "charClass": "char-marym",
                "emotional": true
        },
        {
                "from": "Peter",
                "text": "Mary—",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Mary Magdalene",
                "text": "I know what grief sounds like. I know what hope pretending to be grief sounds like. This was neither. It was Him.",
                "side": "left",
                "charClass": "char-marym",
                "emotional": true
        },
        {
                "from": "Mary (mother)",
                "text": "Praise God.",
                "side": "left",
                "charClass": "char-mary",
                "emotional": true
        },
        {
                "type": "verse",
                "side": "right",
                "tag": "Rumor in the city",
                "tone": "rumor",
                "verseText": "'Tell people, 'His disciples came by night and stole him away while we were asleep.''",
                "citation": "Matthew 28:13"
        },
        {
                "note": "*Later that day*",
                "time": 1080
        },
        {
                "from": "Cleopas",
                "text": "I need everyone to listen.",
                "side": "left",
                "charClass": "char-cleopas"
        },
        {
                "from": "Cleopas",
                "text": "We were on the road to Emmaus. He came alongside us, and we did not know Him.",
                "side": "left",
                "charClass": "char-cleopas"
        },
        {
                "from": "Matthew",
                "text": "How did you not know Him?",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Cleopas",
                "text": "Because sorrow makes fools of the eyes.",
                "side": "left",
                "charClass": "char-cleopas"
        },
        {
                "type": "verse",
                "side": "left",
                "tag": "Scripture",
                "verseText": "'But we had hoped that he was the one to redeem Israel.'",
                "citation": "Luke 24:21"
        },
        {
                "from": "Cleopas",
                "text": "He opened the Scriptures to us.",
                "side": "left",
                "charClass": "char-cleopas"
        },
        {
                "from": "Cleopas",
                "text": "Then at table, He broke the bread.",
                "side": "left",
                "charClass": "char-cleopas"
        },
        {
                "from": "Cleopas",
                "text": "And we knew Him.",
                "side": "left",
                "charClass": "char-cleopas",
                "emotional": true
        },
        {
                "from": "Andrew",
                "text": "Where is He now?",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "Cleopas",
                "text": "Gone from our sight.",
                "side": "left",
                "charClass": "char-cleopas"
        },
        {
                "from": "John",
                "text": "He was just here.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Thomas",
                "text": "Here?",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Peter",
                "text": "In the room. The doors were locked.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "John",
                "text": "He showed us His hands and His side.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "He said, 'Peace be with you.'",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Thomas",
                "text": "You're all speaking like men who have not slept.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Thomas",
                "text": "I will not believe unless I see the mark of the nails myself.",
                "side": "right",
                "charClass": "char-thomas",
                "emotional": true
        },
        {
                "day": "Eight Days Later",
                "time": 720
        },
        {
                "from": "Thomas",
                "text": "I have seen Him.",
                "side": "right",
                "charClass": "char-thomas",
                "emotional": true
        },
        {
                "from": "Matthew",
                "text": "Say that again.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Thomas",
                "text": "I have seen Him.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Thomas",
                "text": "He told me to put my hand there if I needed.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Thomas",
                "text": "My Lord and my God.",
                "side": "right",
                "charClass": "char-thomas",
                "emotional": true
        },
        {
                "from": "Peter",
                "text": "Brother.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Thomas",
                "text": "I was wrong.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "John",
                "text": "No. You were brought all the way through.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "day": "Days Later – Galilee",
                "time": 390
        },
        {
                "context": true,
                "content": "Some of the disciples return to the lake. Peter, Thomas, John, James, and others fish through the night. At daybreak, Jesus is waiting on the shore."
        },
        {
                "from": "Peter",
                "text": "I went fishing.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "James",
                "text": "Some of us did.",
                "side": "left",
                "charClass": "char-james"
        },
        {
                "from": "John",
                "text": "He was on the shore at daybreak.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Thomas",
                "text": "Of course He was.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Peter",
                "text": "We did not know it was Him at first.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "John",
                "text": "I knew when the nets filled.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "He made breakfast.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Thomas",
                "text": "The risen Son of God made you breakfast?",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Peter",
                "text": "Bread. Fish. Fire on the shore.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "John",
                "text": "Then He asked Peter three times if he loved Him.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "Yes.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Peter",
                "text": "Yes.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Peter",
                "text": "Lord, You know everything. You know that I love You.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "from": "Mary Magdalene",
                "text": "And?",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Peter",
                "text": "He told me to feed His sheep.",
                "side": "left",
                "charClass": "char-peter",
                "emotional": true
        },
        {
                "type": "verse",
                "side": "right",
                "tag": "Scripture",
                "verseText": "'Simon, son of John, do you love me?' … 'Feed my sheep.'",
                "citation": "John 21:17"
        },
        {
                "note": "*Later*",
                "time": 840
        },
        {
                "from": "Matthew",
                "text": "He keeps speaking about the kingdom of God.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "James",
                "text": "Not the kind of kingdom we expected.",
                "side": "left",
                "charClass": "char-james"
        },
        {
                "from": "Andrew",
                "text": "Never the kind we expected.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "Peter",
                "text": "He said we are to wait in Jerusalem.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Thomas",
                "text": "Wait for what?",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "John",
                "text": "The promise of the Father.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Mary (mother)",
                "text": "Then we wait.",
                "side": "left",
                "charClass": "char-mary"
        },
        {
                "day": "The Day of the Ascension",
                "time": 540
        },
        {
                "from": "John",
                "text": "We were at the Mount of Olives.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Matthew",
                "text": "He led us out as far as Bethany.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Peter",
                "text": "He told us again not to leave Jerusalem. To wait for the promise of the Father.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Thomas",
                "text": "I asked whether this was the moment. Whether He would restore the kingdom now.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Peter",
                "text": "He told us that was not ours to know. Times and seasons belong to the Father.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "type": "verse",
                "side": "right",
                "tag": "Scripture",
                "tone": "promise",
                "verseText": "'It is not for you to know times or seasons … But you will receive power … and you will be my witnesses.'",
                "citation": "Acts 1:7–8"
        },
        {
                "from": "Andrew",
                "text": "You will receive power when the Holy Spirit comes upon you.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "Matthew",
                "text": "And that we would be His witnesses. Here first. Then farther.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "John",
                "text": "Jerusalem. Judea. Samaria. To the ends of the earth.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "John",
                "text": "Then He lifted His hands.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Matthew",
                "text": "He was blessing us.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Matthew",
                "text": "He was still blessing us when He began to rise.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "type": "verse",
                "side": "left",
                "tag": "Scripture",
                "tone": "promise",
                "verseText": "'While he blessed them, he parted from them.'",
                "citation": "Luke 24:51"
        },
        {
                "from": "Thomas",
                "text": "He did not step back. He did not turn away. He just went up.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Andrew",
                "text": "None of us moved.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "James",
                "text": "None of us even spoke.",
                "side": "left",
                "charClass": "char-james"
        },
        {
                "from": "Andrew",
                "text": "We just stood there looking up.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "Peter",
                "text": "A cloud took Him from our sight.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Peter",
                "text": "I will spend the rest of my life failing to describe what I just saw.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Matthew",
                "text": "Is anyone moving?",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "James",
                "text": "No.",
                "side": "left",
                "charClass": "char-james"
        },
        {
                "from": "Thomas",
                "text": "Then this is the waiting.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "John",
                "text": "Two men were suddenly standing there in white.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "John",
                "text": "They asked why we were still staring into heaven.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "type": "verse",
                "side": "right",
                "tag": "Scripture",
                "tone": "promise",
                "verseText": "'Men of Galilee, why do you stand looking into heaven?'",
                "citation": "Acts 1:11"
        },
        {
                "from": "Peter",
                "text": "They said He would come again the same way we saw Him go.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Mary (mother)",
                "text": "Because He told you what to do. Come back to the city. We wait.",
                "side": "left",
                "charClass": "char-mary"
        },
        {
                "day": "The Waiting Days",
                "time": 660
        },
        {
                "context": true,
                "content": "Back in Jerusalem, they gather again in the upper room. This waiting is no longer empty. Prayer becomes the shape of obedience, and every silence now leans toward the promise He gave them."
        },
        {
                "from": "John",
                "text": "Everyone is gathered.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Matthew",
                "text": "We are praying together daily.",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Joanna",
                "text": "The room feels full even in silence.",
                "side": "left",
                "charClass": "char-joanna"
        },
        {
                "from": "Peter",
                "text": "We chose Matthias.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Thomas",
                "text": "Strange how grief made room for obedience.",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Mary Magdalene",
                "text": "Strange how obedience is beginning to feel like joy.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Andrew",
                "text": "Every prayer feels like it is leaning toward something.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "John",
                "text": "The promise has not come yet.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "But the waiting does not feel empty now.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Mary (mother)",
                "text": "Then pray again.",
                "side": "left",
                "charClass": "char-mary"
        },
        {
                "day": "Day 50 – Pentecost",
                "time": 540
        },
        {
                "context": true,
                "content": "They are together in one place when the sound comes—like a violent wind, though the air outside is still. What descends does not burn the room down. It fills it."
        },
        {
                "from": "Matthew",
                "text": "Does anyone else hear that?",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Andrew",
                "text": "Wind.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "John",
                "text": "There is no wind outside.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Thomas",
                "text": "Then why is the room roaring?",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Mary Magdalene",
                "text": "Fire—",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Peter",
                "text": "Not burning. Resting.",
                "side": "left",
                "charClass": "char-peter",
                "pentecostFire": true
        },
        {
                "from": "Joanna",
                "text": "Over each of us.",
                "side": "left",
                "charClass": "char-joanna",
                "pentecostFire": true
        },
        {
                "from": "Matthew",
                "text": "I am speaking and I do not know this language.",
                "side": "left",
                "charClass": "char-matthew",
                "pentecostFire": true
        },
        {
                "from": "Andrew",
                "text": "People in the street are stopping.",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "John",
                "text": "They hear us.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Thomas",
                "text": "They understand us.",
                "side": "right",
                "charClass": "char-thomas",
                "pentecostFire": true
        },
        {
                "note": "*Crowd reactions forwarded by Matthew*",
                "time": 570
        },
        {
                "from": "Matthew",
                "text": "'Parthians… Medes… Elamites… Visitors from Rome… How is this possible?'",
                "side": "left",
                "charClass": "char-matthew"
        },
        {
                "from": "Peter",
                "text": "They think we are drunk.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "type": "verse",
                "side": "right",
                "tag": "Scripture",
                "tone": "rumor",
                "verseText": "'Others mocking said, "They are filled with new wine."'",
                "citation": "Acts 2:13"
        },
        {
                "from": "John",
                "text": "It is nine in the morning.",
                "side": "left",
                "charClass": "char-john"
        },
        {
                "from": "Peter",
                "text": "I'm going downstairs.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Thomas",
                "text": "To do what?",
                "side": "right",
                "charClass": "char-thomas"
        },
        {
                "from": "Peter",
                "text": "To stand up.",
                "side": "left",
                "charClass": "char-peter",
                "pentecostFire": true
        },
        {
                "from": "Mary Magdalene",
                "text": "Then stand up.",
                "side": "left",
                "charClass": "char-marym"
        },
        {
                "from": "Peter",
                "text": "He said this would happen.",
                "side": "left",
                "charClass": "char-peter",
                "pentecostFire": true
        },
        {
                "type": "verse",
                "side": "left",
                "tag": "Scripture",
                "tone": "fire",
                "verseText": "'I will pour out my Spirit on all flesh.'",
                "citation": "Joel 2:28 / Acts 2:17"
        },
        {
                "note": "*Later that day*",
                "time": 900
        },
        {
                "from": "Peter",
                "text": "I preached Christ to them.",
                "side": "left",
                "charClass": "char-peter"
        },
        {
                "from": "Andrew",
                "text": "How many stayed?",
                "side": "left",
                "charClass": "char-andrew"
        },
        {
                "from": "Peter",
                "text": "About three thousand.",

        function assignConversationSides(items) {
            const resolved = [];
            let lastSpeaker = null;
            let lastSide = 'right';

            for (const item of items) {
                if (!item?.from) {
                    resolved.push({ ...item });
                    continue;
                }

                const next = { ...item };
                if (lastSpeaker && item.from === lastSpeaker) {
                    next.side = lastSide;
                } else {
                    next.side = lastSide === 'left' ? 'right' : 'left';
                }

                lastSpeaker = item.from;
                lastSide = next.side;
                resolved.push(next);
            }

            return resolved;
        }

        function buildSequence(items) {
            const sequence = [];
            const normalizedItems = assignConversationSides(items);

            for (const item of normalizedItems) {
                sequence.push(item);

                for (const beat of typingBeats) {
                    const matchesAfterText = beat.afterText && item.text === beat.afterText;
                    const matchesAfterNote = beat.afterNote && item.note === beat.afterNote;
                    const matchesAfterContext = beat.afterContextText && item.content === beat.afterContextText;

                    if (matchesAfterText || matchesAfterNote || matchesAfterContext) {
                        sequence.push({ type: 'typing', ...beat });
                    }
                }
            }

            return assignConversationSides(sequence);
        }

            const triggerRect = trigger.getBoundingClientRect();

            const margin = 12;

            let top = triggerRect.bottom + 10;
            if (top + popRect.height > window.innerHeight - margin) {

            if (top < margin) top = margin;

            let left = triggerRect.left;
            if (left + popRect.width > window.innerWidth - margin) {
                left = window.innerWidth - popRect.width - margin;

            if (left < margin) left = margin;

            bioPopover.style.top = `${top}px`;

        function isImpactLine(text = '') {
            return /(it is finished|my lord and my god|he said my name|the stone is moved|the tomb is empty|a cloud took him|three thousand|receive the holy spirit|he is not here|it is him|my son|we stay\. we do not look away\.|feed my sheep)/i.test(text);

        function isQuickReply(text = '') {
            return /^(No\.?|Yes\.?|Go\.?|Me too\.?|Brother\.?|Already gone\.?|Praise God\.?|Here\?)$/i.test(text.trim());

        function getTransitionDelay(currentItem, nextItem) {
            let delay = baseDelay;

            if (!currentItem) {
                return delay;
            }

            if (currentItem.day) delay *= 0.84;
            if (currentItem.note) delay *= 0.90;
            if (currentItem.context) delay *= 1.12;
            if (currentItem.type === 'verse') delay *= 1.08;

            if (currentItem.from && currentItem.text) {
                const words = countWords(currentItem.text);
                delay += Math.min(words * 34, 950);

                if (words <= 2) delay *= 0.52;
                else if (words <= 5) delay *= 0.68;
                else if (words <= 10) delay *= 0.82;
                else if (words >= 18) delay *= 1.12;

                if (currentItem.emotional) delay *= 1.18;
                if (isImpactLine(currentItem.text)) delay *= 1.18;
                if (/…|\.\.\./.test(currentItem.text)) delay *= 1.08;
                if (isQuickReply(currentItem.text)) delay *= 0.70;
                if (/\?$/.test(currentItem.text)) delay *= 0.94;
            }

            if (nextItem?.from && currentItem?.from && nextItem.from === currentItem.from) {
                delay *= 0.72;
            }
            if (nextItem?.type === 'verse') {
                delay *= 1.08;
            }

            if (nextItem?.from && nextItem.text) {
                const nextWords = countWords(nextItem.text);
                if (nextWords <= 4) delay *= 0.86;
                if (isQuickReply(nextItem.text)) delay *= 0.82;
            }

            const jitter = 0.86 + Math.random() * 0.34;
            delay *= jitter;

            if (Math.random() < 0.14 && nextItem?.from) {
                delay *= 0.78;
            }

            if ((currentItem?.emotional || currentItem?.context || isImpactLine(currentItem?.text || '')) && Math.random() < 0.40) {
                delay *= 1.18;
            }

            return Math.max(450, Math.min(delay, baseDelay * 1.95));
        }

        function scheduleNext(currentItem) {
            const nextItem = messages[currentMsg + 1];
            const delay = getTransitionDelay(currentItem, nextItem);
            advancePlayback(delay);
        }

        function handleNewContentArrival(wasFollowing) {
            if (wasFollowing && autoFollow && !userPausedLive) {
                unseenCount = 0;
                updateNewIndicator();
                scrollToBottom(true);
            } else {
                unseenCount += 1;
                updateNewIndicator();
                showScrollButton();
            }
        }

        function addMessage(msg) {
            updateTimelineState(msg);
            const wasFollowing = autoFollow && !userPausedLive;

            if (msg.day && typeof msg.time === 'number' && msg.time > 0) {
                appendNode(createDayMarker(msg.day));
            }

            if (msg.context === true) {
                appendNode(createContextBox(msg));
            }

            if (msg.note && !msg.from) {
                appendNode(createNote(msg));
            }

            if (msg.from && msg.text) {
                appendNode(createMessage(msg));
            }

            handleNewContentArrival(wasFollowing);
            scheduleNext(msg);
        }

        function playVerse(item) {
            updateTimelineState(item);
            const delay = showScriptureBanner(item);
            advancePlayback(delay);
        }

        function playTyping(item) {
            const wasFollowing = autoFollow && !userPausedLive;
            const typingNode = createTypingIndicator(item);
            appendNode(typingNode);
            handleNewContentArrival(wasFollowing);

            clearTimeout(nextTimer);
            nextTimer = setTimeout(() => {
                typingNode.classList.add('fade-away');
                setTimeout(() => {
                    typingNode.remove();
                    if (wasFollowing && autoFollow && !userPausedLive) {
                        unseenCount = 0;
                        updateNewIndicator();
                        scrollToBottom(true, true);
                    } else {
                        updateNewIndicator();
                        showScrollButton();
                    }
                    advancePlayback(item.unsent ? 260 : 140);
                }, 220);
            }, item.duration || 1000);
        }

        function play() {
            if (!isPlaying) return;
            const msg = messages[currentMsg];
            if (msg.type === 'typing') {
                playTyping(msg);
                return;
            }
            if (msg.type === 'verse') {
                playVerse(msg);
                return;
            }
            addMessage(msg);
        }

        bioPopover.addEventListener('mouseenter', clearBioHideTimer);
        bioPopover.addEventListener('mouseleave', hideBio);

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.contact-trigger') && !bioPopover.contains(event.target)) {
                hideBio();
            }
        });

        window.addEventListener('resize', () => {
            if (currentBioTrigger && bioPopover.classList.contains('visible')) {
                positionBio(currentBioTrigger);
            }
        });
        chat.addEventListener('wheel', (event) => {
            if (event.deltaY < -2) {
                pauseLiveFollow();
            }
        }, { passive: true });

        let touchStartY = null;
        chat.addEventListener('touchstart', (event) => {
            touchStartY = event.touches?.[0]?.clientY ?? null;
        }, { passive: true });

        chat.addEventListener('touchmove', (event) => {
            const currentY = event.touches?.[0]?.clientY ?? null;
            if (touchStartY !== null && currentY !== null && currentY > touchStartY + 6) {
                pauseLiveFollow();
            }
            if (!isNearBottom()) {
                pauseLiveFollow();
            }
        }, { passive: true });

        chat.addEventListener('scroll', () => {
            hideBio();
            if (suppressScrollListener) return;

            const currentTop = chat.scrollTop;
            const moved = Math.abs(currentTop - lastScrollTop) > 2;
            const scrollingUp = currentTop < lastScrollTop - 2;
            const nearBottom = isNearBottom();

            if (moved && (scrollingUp || !nearBottom)) {
                pauseLiveFollow();
            }

            if (nearBottom) {
                userPausedLive = false;
                autoFollow = true;
                unseenCount = 0;
            }

            lastScrollTop = currentTop;
            updateNewIndicator();
            showScrollButton();
        });

        window.addEventListener('load', () => {
            updateParticipantCount();
            setSpeed(2);
            userPausedLive = false;
            autoFollow = true;
            unseenCount = 0;
            updateNewIndicator();
            hideScriptureBanner(true);
            scrollToBottom(true, true);
            lastScrollTop = chat.scrollTop;
            setTimeout(play, 800);
            showScrollButton();
        });
    </script>
</body>
</html>
